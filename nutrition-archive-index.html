<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Archive — Kitchen Share</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --gold: #c8a96e;
    --brown: #3a2e1e;
    --mid: #5a4a32;
    --light: #d4c4a8;
    --bg-card: #faf7f2;
    --highlight: #2c5f2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream);
    font-family: 'Lora', Georgia, serif;
    padding: 48px 28px 64px;
    max-width: 680px;
    margin: 0 auto;
    color: var(--brown);
  }
  header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--light);
    padding-bottom: 26px;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 400;
    color: var(--brown);
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--mid);
    font-style: italic;
  }
  a {
    color: var(--highlight);
    text-decoration: none;
    border-bottom: 1px solid var(--gold);
  }
  a:hover {
    color: var(--gold);
  }
  .current-link {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--light);
    padding: 18px 24px;
    margin-bottom: 34px;
    text-decoration: none;
    border-bottom: 1px solid var(--light);
  }
  .current-link:hover {
    border-color: var(--gold);
  }
  .current-label {
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
  }
  .current-title {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--brown);
    border-bottom: none;
  }
  .archive-title {
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  ul.weeks {
    list-style: none;
  }
  ul.weeks li {
    padding: 12px 0;
    border-bottom: 1px dotted var(--light);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  ul.weeks li a {
    font-size: 15px;
    border-bottom: none;
  }
  ul.weeks li a:hover {
    border-bottom: 1px solid var(--gold);
  }
  ul.weeks li .week-date {
    font-size: 11.5px;
    color: var(--mid);
    white-space: nowrap;
    flex-shrink: 0;
  }
  footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--light);
    font-size: 11.5px;
    color: var(--mid);
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <div class="header-label"><a href="https://thekitchenshare.substack.com" target="_blank" rel="noopener">Kitchen Share</a> &middot; <a href="https://lilavana.org" target="_blank" rel="noopener">Lilavana</a></div>
  <h1>Nutrition Archive</h1>
  <div class="subtitle">Every week's nutrition sheet, most recent first</div>
</header>

<a class="current-link" href="/nutrition">
  <span class="current-label">This week</span>
  <span class="current-title">See this week's nutrition sheet &rarr;</span>
</a>

<div class="archive-title">Past weeks</div>
<ul class="weeks">
  <!-- Add one <li> per archived week, newest at the top. Example: -->
  <li><a href="2026-07-21.html">Week of July 21</a><span class="week-date">2026-07-21</span></li>
  <!-- <li><a href="YYYY-MM-DD.html">Week of Month Day, Year</a><span class="week-date">YYYY-MM-DD</span></li> -->
</ul>

<footer>
  Figures are per-serving estimates built from standard ingredient databases and recipe measurements.
</footer>

</body>
</html>
